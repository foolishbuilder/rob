name: One-Time DB Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type APPLY_ROB_DB_CHANGES to continue"
        required: true
        type: string
      apply_dev:
        description: "Apply dev DB steps"
        required: true
        default: true
        type: boolean
      apply_prod:
        description: "Apply prod DB steps"
        required: true
        default: false
        type: boolean
      run_create_roles:
        description: "Run 01_create_roles.sql (requires passwords to be set in SQL script)"
        required: true
        default: false
        type: boolean
      run_create_databases:
        description: "Run 02_create_databases.sql"
        required: true
        default: true
        type: boolean
      run_dev_ownership_fix:
        description: "Run dev ownership repair script (05)"
        required: true
        default: false
        type: boolean
      run_legacy_merge_cleanup:
        description: "Run legacy merge/cleanup prep script (06, non-drop)"
        required: true
        default: false
        type: boolean
      run_verify_sql:
        description: "Run SQL verification script (07)"
        required: true
        default: true
        type: boolean
      run_runtime_checks:
        description: "Run scripts.check_db with runtime URLs if provided"
        required: true
        default: false
        type: boolean

concurrency:
  group: one-time-db-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and PostgreSQL client
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Guardrail confirmation
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirmation }}" != "APPLY_ROB_DB_CHANGES" ]]; then
            echo "Confirmation mismatch. Aborting."
            exit 1
          fi

      - name: Apply shared bootstrap scripts
        env:
          ROB_DB_ADMIN_DATABASE_URL: ${{ secrets.ROB_DB_ADMIN_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${ROB_DB_ADMIN_DATABASE_URL:-}" ]]; then
            echo "Missing required secret: ROB_DB_ADMIN_DATABASE_URL"
            exit 1
          fi

          if [[ "${{ inputs.run_create_roles }}" == "true" ]]; then
            psql "$ROB_DB_ADMIN_DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/db/01_create_roles.sql
          else
            echo "Skipping role creation script (01_create_roles.sql)."
          fi

          if [[ "${{ inputs.run_create_databases }}" == "true" ]]; then
            psql "$ROB_DB_ADMIN_DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/db/02_create_databases.sql
          else
            echo "Skipping database creation script (02_create_databases.sql)."
          fi

      - name: Apply development DB changes
        if: ${{ inputs.apply_dev }}
        env:
          ROB_DB_ADMIN_DATABASE_URL: ${{ secrets.ROB_DB_ADMIN_DATABASE_URL }}
          ROB_DEV_BOT_DATABASE_URL: ${{ secrets.ROB_DEV_BOT_DATABASE_URL }}
          ROB_DEV_WEBHOOK_DATABASE_URL: ${{ secrets.ROB_DEV_WEBHOOK_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${ROB_DB_ADMIN_DATABASE_URL:-}" ]]; then
            echo "Missing required secret: ROB_DB_ADMIN_DATABASE_URL"
            exit 1
          fi

          derive_url_for_db() {
            local database_name="$1"
            python - "$ROB_DB_ADMIN_DATABASE_URL" "$database_name" <<'PY'
import sys
from urllib.parse import urlsplit, urlunsplit

url = sys.argv[1]
db_name = sys.argv[2]
parts = urlsplit(url)
print(urlunsplit((parts.scheme, parts.netloc, f"/{db_name}", parts.query, parts.fragment)))
PY
          }

          export MIGRATION_DATABASE_URL="$(derive_url_for_db rob_dev)"
          PYTHONPATH=. python -m scripts.run_migrations

          psql "$ROB_DB_ADMIN_DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/db/03_grant_dev_permissions.sql

          if [[ "${{ inputs.run_dev_ownership_fix }}" == "true" ]]; then
            psql "$ROB_DB_ADMIN_DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/db/05_fix_dev_table_ownership.sql
          fi
          if [[ "${{ inputs.run_legacy_merge_cleanup }}" == "true" ]]; then
            psql "$ROB_DB_ADMIN_DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/db/06_cleanup_legacy_tables.sql
          fi
          if [[ "${{ inputs.run_verify_sql }}" == "true" ]]; then
            psql "$ROB_DB_ADMIN_DATABASE_URL" -d rob_dev -v ON_ERROR_STOP=1 -f scripts/db/07_verify_permissions.sql
          fi

          if [[ "${{ inputs.run_runtime_checks }}" == "true" ]]; then
            if [[ -n "${ROB_DEV_BOT_DATABASE_URL:-}" ]]; then
              export DATABASE_URL="$ROB_DEV_BOT_DATABASE_URL"
              PYTHONPATH=. python -m scripts.check_db
            else
              echo "Skipping bot runtime check (ROB_DEV_BOT_DATABASE_URL not configured)."
            fi
            if [[ -n "${ROB_DEV_WEBHOOK_DATABASE_URL:-}" ]]; then
              export DATABASE_URL="$ROB_DEV_WEBHOOK_DATABASE_URL"
              PYTHONPATH=. python -m scripts.check_db
            else
              echo "Skipping webhook runtime check (ROB_DEV_WEBHOOK_DATABASE_URL not configured)."
            fi
          fi

      - name: Apply production DB changes
        if: ${{ inputs.apply_prod }}
        env:
          ROB_DB_ADMIN_DATABASE_URL: ${{ secrets.ROB_DB_ADMIN_DATABASE_URL }}
          ROB_PROD_BOT_DATABASE_URL: ${{ secrets.ROB_PROD_BOT_DATABASE_URL }}
          ROB_PROD_WEBHOOK_DATABASE_URL: ${{ secrets.ROB_PROD_WEBHOOK_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${ROB_DB_ADMIN_DATABASE_URL:-}" ]]; then
            echo "Missing required secret: ROB_DB_ADMIN_DATABASE_URL"
            exit 1
          fi

          derive_url_for_db() {
            local database_name="$1"
            python - "$ROB_DB_ADMIN_DATABASE_URL" "$database_name" <<'PY'
import sys
from urllib.parse import urlsplit, urlunsplit

url = sys.argv[1]
db_name = sys.argv[2]
parts = urlsplit(url)
print(urlunsplit((parts.scheme, parts.netloc, f"/{db_name}", parts.query, parts.fragment)))
PY
          }

          export MIGRATION_DATABASE_URL="$(derive_url_for_db rob_prod)"
          PYTHONPATH=. python -m scripts.run_migrations

          psql "$ROB_DB_ADMIN_DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/db/04_grant_prod_permissions.sql

          if [[ "${{ inputs.run_verify_sql }}" == "true" ]]; then
            psql "$ROB_DB_ADMIN_DATABASE_URL" -d rob_prod -v ON_ERROR_STOP=1 -f scripts/db/07_verify_permissions.sql
          fi

          if [[ "${{ inputs.run_runtime_checks }}" == "true" ]]; then
            if [[ -n "${ROB_PROD_BOT_DATABASE_URL:-}" ]]; then
              export DATABASE_URL="$ROB_PROD_BOT_DATABASE_URL"
              PYTHONPATH=. python -m scripts.check_db
            else
              echo "Skipping bot runtime check (ROB_PROD_BOT_DATABASE_URL not configured)."
            fi
            if [[ -n "${ROB_PROD_WEBHOOK_DATABASE_URL:-}" ]]; then
              export DATABASE_URL="$ROB_PROD_WEBHOOK_DATABASE_URL"
              PYTHONPATH=. python -m scripts.check_db
            else
              echo "Skipping webhook runtime check (ROB_PROD_WEBHOOK_DATABASE_URL not configured)."
            fi
          fi

      - name: One-time workflow reminder
        run: |
          echo "Workflow completed."
          echo "If this was the one-time run, remove or disable .github/workflows/db-one-time-bootstrap.yml."
